<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - Estacionamiento ULEAM</title>
    <link rel="stylesheet" href="Login.css">
</head>
<body>
    <div class="login-container">
        <img src="/img/ULEAM.png" alt="Logo ULEAM Estacionamiento" class="logo-img">
        <h1>Recuperación de Contraseña</h1>
        <form id="recoveryForm" onsubmit="return validarRecuperacion()">
            <div class="form-group">
                <label for="recoveryEmail">Correo Electrónico:</label>
                <input type="text" id="recoveryEmail" name="recoveryEmail" placeholder="example@correo.com" required>
                <span id="recoveryEmailError" class="error-message"></span>
            </div>
            <div class="button-group">
                <button type="submit">Recuperar Contraseña</button>
            </div>
        </form>
    </div>

    <script>
        function validarRecuperacion() {
            let recoveryEmail = document.getElementById("recoveryEmail").value.trim();
            let recoveryEmailError = document.getElementById("recoveryEmailError");
            let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

            recoveryEmailError.textContent = "";

            let isValid = true;

            if (!recoveryEmail.match(emailPattern)) {
                recoveryEmailError.textContent = "Por favor, ingrese un correo válido.";
                isValid = false;
            }

            if (isValid) {
                alert("Instrucciones para recuperar su contraseña han sido enviadas a " + recoveryEmail);
                return false; 
            }

            return false; 
        }
    </script>
</body>
</html>
